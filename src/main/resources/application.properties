
#  FacePoint  Runtime Configuration
#  Location: src/main/resources/application.properties


# Server
server.port=8080
server.servlet.context-path=/

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/facepoint
spring.datasource.username=facepoint_user
spring.datasource.password=facepoint_password
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
# Kept deliberately small to stay within the 256 MB memory budget.
# 5 connections comfortably serve sequential check-in workloads.
spring.datasource.hikari.pool-name=FacePointPool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
# 'update' creates tables on the first run and applies safe schema changes.
# Switch to 'validate' in production once the schema is stable.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Batch inserts are not needed for check-in volume but good practice
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.open-in-view=false

# CompreFace Integration
# Replace with the URL and key from your self-hosted CompreFace instance.
# In production, override these via environment variables:
#   COMPREFACE_BASE_URL=http://your-server:8000
#   COMPREFACE_API_KEY=your-real-key
compreface.base-url=http://localhost:8000
compreface.api-key=your-compreface-api-key

# Minimum cosine-similarity score (0.0?1.0) to accept a match.
# 0.85 is a safe starting point ? raise it to reduce false positives.
compreface.recognition.min-similarity=0.85

# Max faces to detect per image. 1 is correct for single-person check-in.
compreface.recognition.limit=1

# HTTP timeouts for calls to CompreFace (milliseconds)
compreface.recognition.connect-timeout=5000
compreface.recognition.read-timeout=15000

# Jackson (JSON serialisation)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# Logging
logging.level.root=WARN
logging.level.com.facepoint=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
# Uncomment below to see full SQL with bound parameter values during debugging:
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE

#  Actuator (useful for health checks)
# Expose only the health endpoint; avoids leaking internals in production
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never